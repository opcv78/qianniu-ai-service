# AI 客服系统配置文件

llm:
  api_key: "YOUR_JINGDONG_API_KEY"
  base_url: "https://api.jdcloud.com/v1"  # 京东云大模型API地址
  model: "jdcloud-model-name"  # 京东云模型名称

rpa:
  # 千牛聊天消息列表区域坐标（点击读取消息）
  chat_list_x: 1200
  chat_list_y: 640
  # 千牛消息输入框坐标（点击输入）
  input_box_x: 1202
  input_box_y: 958
  # 发送按钮坐标
  send_btn_x: 1405
  send_btn_y: 1076
  # 轮询间隔(秒)
  poll_interval: 3

knowledge:
  # FAQ 知识库路径
  faq_path: "data/faq.md"
  # 向量库持久化路径
  chroma_persist_dir: "data/chroma_db"
  # embedding 模型
  embedding_model: "text-embedding-3-small"

hotkey:
  # 全局退出热键
  exit_key: "esc"